name: Stage Deployment

on:
  push:
    branches:
      - Stage
  pull_request:
    branches:
      - Stage

jobs:
  stage-build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: stage
      url: https://steven29-test.github.io/Jamien-flooring/

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Build the app
        run: npm run build

      - name: Deploy to Stage GitHub Pages
        if: github.ref == 'refs/heads/Stage' && github.event_name == 'push'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages-stage
          cname: false

      - name: Stage Deployment Summary
        if: github.ref == 'refs/heads/Stage' && github.event_name == 'push'
        run: |
          echo "✅ Stage Deployment Completed!"
          echo "Environment: stage"
          echo "Branch: gh-pages-stage"
          echo "URL: https://steven29-test.github.io/Jamien-flooring/"
          echo "Commit: ${{ github.sha }}"
