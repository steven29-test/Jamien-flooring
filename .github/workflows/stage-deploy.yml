name: Deploy to Stage

on:
  push:
    branches:
      - Stage
  pull_request:
    branches:
      - Stage

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Build the app
        run: npm run build

      - name: Deploy to Stage GitHub Pages
        if: github.ref == 'refs/heads/Stage' && github.event_name == 'push'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages-stage

      - name: Deployment Summary
        if: github.ref == 'refs/heads/Stage' && github.event_name == 'push'
        run: |
          echo "✅ Stage deployment completed!"
          echo "Stage environment URL: https://steven29-test.github.io/Jamien-flooring/"
