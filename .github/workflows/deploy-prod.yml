name: Deploy Production

on:
  push:
    branches:
      - main

jobs:
  deploy-prod:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install and build
        run: npm ci && npm run build

      - name: Push to Jamien-flooring-prod repo
        env:
          DEPLOY_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd /tmp
          git clone https://steven29-test:${DEPLOY_TOKEN}@github.com/steven29-test/Jamien-flooring-prod.git deploy-prod 2>&1 || mkdir deploy-prod
          cd deploy-prod
          git init || true
          git remote remove origin 2>/dev/null || true
          git remote add origin https://steven29-test:${DEPLOY_TOKEN}@github.com/steven29-test/Jamien-flooring-prod.git
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"
          rm -rf * .github .gitignore
          cp -r $GITHUB_WORKSPACE/dist/* .
          echo "www.jamienflooring.com.au" > CNAME
          git add .
          git commit -m "Deploy Production build from ${{ github.sha }}" || echo "No changes"
          git push -u origin master:main --force

      - name: Deployment Complete
        run: echo "✅ Production deployed to https://www.jamienflooring.com.au"
